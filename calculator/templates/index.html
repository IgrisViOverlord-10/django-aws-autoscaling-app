<!DOCTYPE html>
<html>
<head>
    <title>Django Calculator</title>

<style>
body {
    background: #b0b0b0; /* grey background */
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

h1 {
    margin-bottom: 10px;
    color: black;
}

h2 {
    margin-bottom: 20px;
    color: #333;
    font-size: 16px;
}

.calculator {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.display {
    background: #fff9c4; /* light yellow */
    color: #000;
    padding: 12px;
    font-size: 18px;
    margin-bottom: 10px;
    min-height: 40px;
    word-wrap: break-word;
    border-radius: 5px;
}

#resultBox {
    background: #fff9c4; /* light yellow */
    color: #000;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    min-height: 40px;
    word-wrap: break-word;
    border-radius: 5px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 16px;
    border: none;
    background: #ddd;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #ccc;
}

.equal {
    background: #4CAF50;
    color: white;
}

.clear {
    background: #f44336;
    color: white;
}
</style>
</head>

<body>

<h1>Django Calculator</h1>
<h2>Supports: + - × ÷ √ ² ( ) % and implicit multiplication</h2>

<div class="calculator">

    <!-- Input display -->
    <div class="display" id="display">{{ expression }}</div>

    <!-- Hidden form to submit -->
    <form method="POST" id="calcForm">
        {% csrf_token %}
        <input type="hidden" name="expression" id="expressionInput">
    </form>

    <!-- Buttons -->
    <div class="buttons">
        <!-- Numbers -->
        <button type="button" onclick="press('7')">7</button>
        <button type="button" onclick="press('8')">8</button>
        <button type="button" onclick="press('9')">9</button>
        <button type="button" onclick="press('÷')">÷</button>

        <button type="button" onclick="press('4')">4</button>
        <button type="button" onclick="press('5')">5</button>
        <button type="button" onclick="press('6')">6</button>
        <button type="button" onclick="press('×')">×</button>

        <button type="button" onclick="press('1')">1</button>
        <button type="button" onclick="press('2')">2</button>
        <button type="button" onclick="press('3')">3</button>
        <button type="button" onclick="press('-')">−</button>

        <button type="button" onclick="press('0')">0</button>
        <button type="button" onclick="press('.')">.</button>
        <button type="button" onclick="press('+')">+</button>
        <button type="button" onclick="press('²')">x²</button>

        <!-- Special -->
        <button type="button" onclick="press('(')">(</button>
        <button type="button" onclick="press(')')">)</button>
        <button type="button" onclick="press('%')">%</button>
        <button type="button" onclick="press('√')">√</button>

        <button type="button" class="clear" onclick="clearDisplay()">C</button>
        <button type="button" class="equal" onclick="calculate()">=</button>
    </div>

    <!-- Result panel -->
    {% if result %}
        <div class="display" id="resultBox">
            Result: {{ result }}
        </div>
    {% endif %}

</div>

<script>
// Initialize JS expression from template
let expression = "{{ expression|escapejs }}";
updateDisplay();

function press(val) {
    expression += val;
    updateDisplay();
}

function updateDisplay() {
    document.getElementById("display").innerText = expression;
}

function clearDisplay() {
    expression = "";
    updateDisplay();
    const resultBox = document.getElementById("resultBox");
    if (resultBox) resultBox.innerText = "";
}

function calculate() {
    document.getElementById("expressionInput").value = expression;
    document.getElementById("calcForm").submit();
    // input display stays as is
}

// Keyboard support
document.addEventListener("keydown", function(event) {
    if (event.key >= '0' && event.key <= '9') press(event.key);
    else if (event.key === '+') press('+');
    else if (event.key === '-') press('-');
    else if (event.key === '*') press('×');
    else if (event.key === '/') press('÷');
    else if (event.key === '.') press('.');
    else if (event.key === '(') press('(');
    else if (event.key === ')') press(')');
    else if (event.key === '%') press('%');

    else if (event.key === 'Enter') {
        event.preventDefault();
        calculate();
    }
    else if (event.key === 'Backspace') {
        expression = expression.slice(0, -1);
        updateDisplay();
    }
});
</script>

</body>
</html>
